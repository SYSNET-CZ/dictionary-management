[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = WARNING
norecursedirs = .venv .git __pycache__ backup upload logs conf resources
markers =
    integration: vyzaduje realnou MongoDB (docker kontejner na localhost:27017)
    unit: jednotkove testy bez externich zavislosti
